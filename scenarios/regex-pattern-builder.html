<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Pattern Builder & Regular Expression Compiler - [June 2026] Updated</title>
    <meta name="description" content="Build complex text validation and scraping regular expressions from descriptive data examples.">
    <meta name="keywords" content="Regex AI generator, text extraction rule builder prompt, string match validation pattern">
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #2ea043; --card: #161b22; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); max-width: 500px; margin: 0 auto; padding: 2rem 1rem; line-height: 1.5; }
        .back-link { color: #58a6ff; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1rem; }
        .back-link:hover { text-decoration: underline; }
        h1 { font-size: 1.6rem; color: #f0f6fc; margin-top: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .intro { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.4rem; font-size: 0.85rem; color: #f0f6fc; }
        textarea, select { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); box-sizing: border-box; font-size: 0.95rem; font-family: inherit; }
        textarea { resize: vertical; }
        textarea:focus, select:focus { border-color: #58a6ff; outline: none; background: #1c2128; }
        .gen-btn { display: block; width: 100%; background: var(--accent); color: white; border: none; padding: 14px; font-weight: bold; font-size: 1.05rem; border-radius: 6px; cursor: pointer; margin-top: 2rem; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .gen-btn:hover { background: #3fb950; }
        .footer { text-align: center; margin-top: 4rem; color: #8b949e; font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to AI Suite Hub</a>
    <h1>🧩 Regex Regular Expression Pattern Builder</h1>
    <p class="intro">Stop debugging backslashes. Supply your targeted string format constraints, and let AI build the exact search engine pattern.</p>
        <div class="form-group">
        <label>What text format are you trying to isolate or validate?</label>
        <textarea id="input_regex_desc" placeholder="e.g., Extracting an international phone number wrapped inside a messy string with country codes" rows="2"></textarea>
    </div>
    <div class="form-group">
        <label>Sample string that should match perfectly</label>
        <textarea id="input_sample" placeholder="e.g., text text +852-12345678 text..." rows="2"></textarea>
    </div>

    <div class="form-group" style="margin-top: 1.5rem;">
        <label>🎯 Choose Target AI Weapon Platform</label>
        <select id="ai-engine-select">
            <option value="chatgpt">ChatGPT (Default - Instant Auto-Fill)</option>
            <option value="perplexity">Perplexity AI (Instant Auto-Fill)</option>
            <option value="claude">Anthropic Claude (High-EQ Master - Auto Clipboard)</option>
        </select>
    </div>
    <button class="gen-btn" onclick="redirectToAI()">🚀 Launch Selected AI & Deliver Result</button>
    <div class="footer">Powered by Automated極客Studio. Built for the 2026 Sovereign LLM Ecosystem.</div>
    <script>
        function redirectToAI() {
            let masterPrompt = "Act as a parsing architecture engineer. Build a valid Regular Expression (Regex) pattern targeting this description: [REGEX_DESC]. Ensure it successfully isolates the provided target data sample format: [SAMPLE]. Provide the raw expression pattern, along with a detailed breakdown of what each boundary token enforces.";
                        let val_input_regex_desc = document.getElementById('input_regex_desc').value.trim() || 'N/A';
            masterPrompt = masterPrompt.replace('[REGEX_DESC]', val_input_regex_desc);
            let val_input_sample = document.getElementById('input_sample').value.trim() || 'N/A';
            masterPrompt = masterPrompt.replace('[SAMPLE]', val_input_sample);

            navigator.clipboard.writeText(masterPrompt);
            const selectedEngine = document.getElementById('ai-engine-select').value;
            let targetUrl = "";
            if (selectedEngine === "chatgpt") {
                targetUrl = "https://chatgpt.com/?q=" + encodeURIComponent(masterPrompt);
                window.open(targetUrl, '_blank');
            } else if (selectedEngine === "perplexity") {
                targetUrl = "https://www.perplexity.ai/?q=" + encodeURIComponent(masterPrompt);
                window.open(targetUrl, '_blank');
            } else if (selectedEngine === "claude") {
                alert('Tailored prompt secured & copied to clipboard! Opening Claude.ai, just hit Ctrl+V (or Cmd+V) to get your result.');
                targetUrl = "https://claude.ai/";
                window.open(targetUrl, '_blank');
            }
        }
    </script>
</body>
</html>
